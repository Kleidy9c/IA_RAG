<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#1a6eff"/>
    </linearGradient>
  </defs>

  <!-- Hexágono exterior -->
  <polygon
    points="36,6 62.57,21 62.57,51 36,66 9.43,51 9.43,21"
    fill="none"
    stroke="rgba(0,229,255,0.22)"
    stroke-width="0.9"/>

  <!-- Hexágono interior dashed -->
  <polygon
    points="36,12 54.39,22.5 54.39,43.5 36,54 17.61,43.5 17.61,22.5"
    fill="none"
    stroke="rgba(0,229,255,0.13)"
    stroke-width="0.8"
    stroke-dasharray="3 5"/>

  <!-- Nodos en vértices -->
  <circle cx="36"    cy="6"  r="2.2" fill="#00e5ff" opacity="0.65"/>
  <circle cx="62.57" cy="21" r="2.2" fill="#00e5ff" opacity="0.45"/>
  <circle cx="62.57" cy="51" r="2.2" fill="#00e5ff" opacity="0.45"/>

  <!-- Cristal de lupa — fondo oscuro -->
  <circle cx="33" cy="31" r="14" fill="#060614"/>
  <!-- Borde lupa con gradiente -->
  <circle cx="33" cy="31" r="14" fill="none" stroke="url(#g)" stroke-width="2.2"/>

  <!-- Reflejo de vidrio -->
  <path d="M26 24 Q30 20 36 21"
    fill="none"
    stroke="rgba(255,255,255,0.13)"
    stroke-width="1.5"
    stroke-linecap="round"/>

  <!-- Líneas de datos internas -->
  <line x1="26" y1="29" x2="40" y2="29" stroke="#00e5ff" stroke-width="1"   stroke-linecap="round" opacity="0.42"/>
  <line x1="26" y1="33" x2="37" y2="33" stroke="#00e5ff" stroke-width="1"   stroke-linecap="round" opacity="0.28"/>
  <line x1="26" y1="37" x2="39" y2="37" stroke="#00e5ff" stroke-width="1"   stroke-linecap="round" opacity="0.22"/>

  <!-- Punto de unión mango -->
  <circle cx="43" cy="41" r="1.6" fill="#00e5ff" opacity="0.9"/>

  <!-- Mango — terminación cuadrada tech -->
  <line x1="43" y1="41" x2="55" y2="53"
    stroke="url(#g)"
    stroke-width="3.2"
    stroke-linecap="square"/>
</svg>
